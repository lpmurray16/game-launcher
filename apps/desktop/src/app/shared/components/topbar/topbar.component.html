<header class="topbar" [class.topbar--focused]="nav.zone() === 'topbar'">
  <div class="topbar__brand">
    <fa-icon [icon]="icons.gamepad" class="topbar__brand-icon" />
    <span class="topbar__brand-name">LAUNCHER</span>
  </div>

  <nav class="topbar__nav">
    <a class="topbar__nav-item" routerLink="/library" routerLinkActive="topbar__nav-item--route-active"
      [routerLinkActiveOptions]="{ exact: true }"
      [class.topbar__nav-item--focused]="nav.zone() === 'topbar' && focusedItem() === 'library'">
      <fa-icon [icon]="icons.gamepad" />
      <span>Library</span>
    </a>
    <a class="topbar__nav-item" routerLink="/library" [queryParams]="{ favorites: true }"
      routerLinkActive="topbar__nav-item--route-active"
      [class.topbar__nav-item--focused]="nav.zone() === 'topbar' && focusedItem() === 'favorites'">
      <fa-icon [icon]="icons.heart" />
      <span>Favorites</span>
    </a>
    <button class="topbar__nav-item" (click)="gameFormModal.openAdd()"
      [class.topbar__nav-item--focused]="nav.zone() === 'topbar' && focusedItem() === 'add'">
      <fa-icon [icon]="icons.plus" />
      <span>Add Game</span>
    </button>
  </nav>

  <div class="topbar__actions">
  </div>
</header>
